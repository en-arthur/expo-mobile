name: WorkersCraft iOS Build
on:
  workflow_dispatch:
    inputs:
      build_type:
        default: 'debug'
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx expo prebuild --platform ios --non-interactive
      - uses: actions/cache@v3
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-
      - run: cd ios && pod install --repo-update
      - name: Build unsigned IPA
        run: |
          cd ios
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" -type d | head -1 | xargs basename)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" | awk '/Schemes:/,0' | grep -v 'Schemes:' | grep -v '^$' | head -1 | xargs)
          echo "Using workspace: $WORKSPACE, scheme: $SCHEME"
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" \
            -configuration Debug -sdk iphonesimulator \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build
          APP=$(find build/Build/Products/Debug-iphonesimulator -maxdepth 2 -name "*.app" -type d | head -1)
          mkdir Payload && cp -r "$APP" Payload/
          zip -r app-debug.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ios-debug
          path: |
            ios/output/*.ipa
            ios/app-debug.ipa
          retention-days: 30
